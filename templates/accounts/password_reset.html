{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Peak Energy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ensure page is displayed standalone, not in iframe or nested layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        body { 
            min-height: 100vh; 
            background-image: linear-gradient(180deg, rgba(0, 20, 40, 0.55), rgba(0, 20, 40, 0.15)); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            position: relative;
        }
        /* Hide any potential parent layout elements */
        body > nav,
        body > .navbar,
        body > .sidebar,
        body > .app-layout {
            display: none !important;
        }
        .auth-wrapper { min-height: 100vh; }
        .auth-card { max-width: 420px; margin: 40px auto; border-radius: 14px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 20px 60px rgba(0,0,0,0.18); backdrop-filter: blur(6px); background: rgba(255,255,255,0.92); }
        .auth-logo { max-width: 120px; max-height: 80px; margin-bottom: 6px; }
        .illustration-wrap { width: 100%; padding: 40px 32px; }
        .illustration-image { width: 100%; height: auto; border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,0.35); outline: 1px solid rgba(255,255,255,0.08); }
        .auth-card input[type="email"] { display: block; width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #d6dee6; background: #fff; transition: box-shadow .2s ease, border-color .2s ease; }
        .auth-card input:focus { outline: none; border-color: #5aa4ff; box-shadow: 0 0 0 4px rgba(45, 136, 255, 0.15); }
        .btn-primary.w-100 { padding: 10px 14px; border-radius: 10px; background: linear-gradient(135deg, #0b6bcb, #0b3d6b); border: none; box-shadow: 0 8px 18px rgba(11, 61, 107, 0.25); }
    </style>
</head>
<body>
    <div class="container-fluid auth-wrapper d-flex align-items-center">
        <div class="row g-0 flex-grow-1">
            <div class="col-lg-7 d-none d-lg-flex align-items-center">
                <div class="illustration-wrap w-100">
                    <img src="{% static 'solar-bg.jpg' %}" alt="Solar farm" class="illustration-image">
                </div>
            </div>
            <div class="col-lg-5 d-flex align-items-center justify-content-center">
                <div class="card auth-card p-4 p-md-5 w-100 mx-auto">
                    <div class="text-center mb-4">
                        <img src="{% static 'PEAK_LOGO.jpg' %}" alt="Logo" class="auth-logo">
                        <h3 class="mb-2">Reset Password</h3>
                        <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" name="email" id="email" required>
                            {% if form.email and form.email.errors %}
                                <div class="text-danger">
                                    {% for error in form.email.errors %}
                                        <small>{{ error }}</small>
                                    {% endfor %}
                                </div>
                            {% endif %}
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Send Reset Link</button>
                        <div class="text-center">
                            <a href="{% url 'accounts:login' %}" class="text-decoration-none">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Force standalone display - break out of any parent frames or layouts
        (function() {
            // Break out of iframe if page is loaded inside one
            if (window.self !== window.top) {
                try {
                    window.top.location = window.self.location;
                } catch (e) {
                    // If we can't break out (cross-origin), at least hide parent elements
                    console.log('Cannot break out of iframe, hiding parent elements');
                }
            }
            
            // Remove any parent layout elements that might have been injected
            document.addEventListener('DOMContentLoaded', function() {
                // Hide any navbars, sidebars, or app layouts
                const elementsToHide = [
                    'nav', '.navbar', '.sidebar', '.app-layout', 
                    '#main-navbar', '.content-area', 'header'
                ];
                
                elementsToHide.forEach(function(selector) {
                    const elements = document.querySelectorAll(selector);
                    elements.forEach(function(el) {
                        if (el.closest('body') && el !== document.body) {
                            el.style.display = 'none';
                        }
                    });
                });
                
                // Ensure body is visible and standalone
                document.body.style.display = 'block';
                document.body.style.margin = '0';
                document.body.style.padding = '0';
            });
        })();
    </script>
</body>
</html>
