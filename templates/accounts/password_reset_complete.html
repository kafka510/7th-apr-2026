{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Complete | Peak Energy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ensure page is displayed standalone, not in iframe or nested layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        body {
            background: #f4f8fb;
            min-height: 100vh;
            position: relative;
        }
        /* Hide any potential parent layout elements */
        body > nav,
        body > .navbar,
        body > .sidebar,
        body > .app-layout {
            display: none !important;
        }
        .reset-card {
            max-width: 400px;
            margin: 60px auto;
            border-radius: 12px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
        }
        .reset-logo {
            max-width: 120px;
            max-height: 80px;
            margin-bottom: 10px;
        }
        .reset-title {
            font-weight: 700;
            color: #003366;
        }
    </style>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card reset-card p-4">
            <div class="text-center mb-4">
                <img src="{% static 'PEAK_LOGO.jpg' %}" alt="Logo" class="reset-logo">
                <h3 class="reset-title">Password Reset Complete</h3>
                <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
            </div>
            <div class="text-center">
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log In</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Force standalone display - break out of any parent frames or layouts
        (function() {
            // Break out of iframe if page is loaded inside one
            if (window.self !== window.top) {
                try {
                    window.top.location = window.self.location;
                } catch (e) {
                    // If we can't break out (cross-origin), at least hide parent elements
                    console.log('Cannot break out of iframe, hiding parent elements');
                }
            }
            
            // Remove any parent layout elements that might have been injected
            document.addEventListener('DOMContentLoaded', function() {
                // Hide any navbars, sidebars, or app layouts
                const elementsToHide = [
                    'nav', '.navbar', '.sidebar', '.app-layout', 
                    '#main-navbar', '.content-area', 'header'
                ];
                
                elementsToHide.forEach(function(selector) {
                    const elements = document.querySelectorAll(selector);
                    elements.forEach(function(el) {
                        if (el.closest('body') && el !== document.body) {
                            el.style.display = 'none';
                        }
                    });
                });
                
                // Ensure body is visible and standalone
                document.body.style.display = 'block';
                document.body.style.margin = '0';
                document.body.style.padding = '0';
            });
        })();
    </script>
</body>
</html>
