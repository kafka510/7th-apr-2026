  IC Budget Vs Expected Generation Dashboard

  - Notes and explanations are provided for users
  - Responsive resizing for charts/maps (if present)

function setupFilters() {
  // Extract unique values for filters (trim spaces for robustness)
  const months = [...new Set(allDataRows.map(row => row['Month'] && row['Month'].trim()).filter(Boolean))];
  const countries = [...new Set(allDataRows.map(row => row['Country'] && row['Country'].trim()).filter(Boolean))];
  const portfolios = [...new Set(allDataRows.map(row => row['Portfolio'] && row['Portfolio'].trim()).filter(Boolean))];

  // Setup BestCalendar with data - convert month format from "Jan 2025" to "2025-01"
  const calendarData = months.map(month => {
    // Handle space-separated format: "Jan 2025"
    const parts = month.split(' ');
    const monthName = parts[0];
    const year = parts[1];
    const monthIndex = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 
                       'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'].indexOf(monthName);
    const fullYear = year; // Already full year format
    const monthNum = String(monthIndex + 1).padStart(2, '0');
    const result = { 
      month: `${fullYear}-${monthNum}`,
      originalMonth: month 
    };
    return result;
  });
  

  
  // Check if BestCalendar is available
  if (typeof BestCalendar === 'undefined') {
    return;
  }
  

  
  calendarInstance = new BestCalendar({
    triggerId: 'monthMatrixTrigger',
    pickerId: 'monthMatrixPicker',
    labelId: 'selectedMonthLabel',
    options: {
      rangeMode: true, // Enable range selection mode
          onPeriodChange: function(period) {
      // Always use renderFilteredTable since it now handles all period types
      renderFilteredTable();
    }
    }
  });
  calendarInstance.setData(calendarData);
  


  // Setup other dropdowns
  renderDropdown('countryFilter', countries, 'Country');
  renderDropdown('portfolioFilter', portfolios, 'Portfolio');
  
  // Setup reset button
  setupResetButton();
  

}

// Helper function to convert month string to Date object
function convertMonthToDate(monthStr) {
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const parts = monthStr.split(' ');
  
  if (parts.length >= 2) {
    const monthPart = parts[0];
    const yearPart = parts[1];
    
    const monthIndex = monthNames.indexOf(monthPart);
    if (monthIndex !== -1 && yearPart) {
      const year = parseInt(yearPart);
      const month = monthIndex + 1;
      return new Date(year, month - 1, 1); // month is 0-indexed in Date constructor
    }
  }
  return null;
}

function renderDropdown(id, options, label) {
  const select = document.getElementById(id);
  select.innerHTML = `<option value="All">All ${label}</option>` +
    options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
  select.onchange = renderFilteredTable;
}

function setupResetButton() {
  const resetBtn = document.getElementById('resetFilters');
  if (resetBtn) {
    resetBtn.addEventListener('click', function() {
      // Reset calendar
      if (calendarInstance) {
        calendarInstance.reset();
      }
      
      // Reset dropdowns
      const countryFilter = document.getElementById('countryFilter');
      const portfolioFilter = document.getElementById('portfolioFilter');
      
      if (countryFilter) countryFilter.value = 'All';
      if (portfolioFilter) portfolioFilter.value = 'All';
      
      // Re-render table with reset filters
      renderFilteredTable();
      
  
    });
  }
}

function renderFilteredTable() {
  const period = calendarInstance ? calendarInstance.getSelectedPeriod() : null;
  const country = document.getElementById('countryFilter').value;
  const portfolio = document.getElementById('portfolioFilter').value;



  // Filter data (trim spaces for robustness)
  let filteredRows = allDataRows.filter(row => {
    let monthMatch = true;
    let rowMonth = row['Month'] && row['Month'].trim();
    let rowCountry = row['Country'] && row['Country'].trim();
    let rowPortfolio = row['Portfolio'] && row['Portfolio'].trim();

    // Handle period filtering with proper null checks
    if (period) {
      if (period.range && period.range.start && period.range.end) {
        // Range selection - use month_sort field for more reliable date comparison
        const rowMonthSort = row['month_sort'];
        if (rowMonthSort) {
          // month_sort is in YYYY-MM-DD format, range.start/end are in YYYY-MM format
          const startDateStr = period.range.start + '-01'; // Add day to make it YYYY-MM-DD
          const endDateStr = period.range.end + '-01';     // Add day to make it YYYY-MM-DD
          monthMatch = rowMonthSort >= startDateStr && rowMonthSort <= endDateStr;
        } else {
          // Fallback to convertMonthToDate if month_sort is not available
          const rowDate = convertMonthToDate(rowMonth);
          if (rowDate) {
            const startDate = new Date(period.range.start + '-01');
            const endDate = new Date(period.range.end + '-01');
            monthMatch = rowDate >= startDate && rowDate <= endDate;
          } else {
                      monthMatch = false;
          }
        }
      } else if (period.month) {
        // Single month selection - convert calendar format to match data format
        const calendarData = calendarInstance.data;
        const selectedData = calendarData.find(item => item.month === period.month);
        if (selectedData && selectedData.originalMonth) {
          monthMatch = rowMonth === selectedData.originalMonth;
        } else {
          // Fallback: try to match the month directly
          const [year, month] = period.month.split('-');
          const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
          const monthName = monthNames[parseInt(month) - 1];
          const expectedFormat = `${monthName} ${year}`;
          monthMatch = rowMonth === expectedFormat;
        }
      } else if (period.year) {
        // Year only selection
        const rowYear = rowMonth ? rowMonth.split(' ')[1] : null; // Extract year from "Jan 2025" format
        monthMatch = rowYear === period.year.toString();
      }
    }
    // If period is null, show all data (monthMatch remains true)

    const countryMatch = country === 'All' || rowCountry === country;
    const portfolioMatch = portfolio === 'All' || rowPortfolio === portfolio;

    return monthMatch && countryMatch && portfolioMatch;
  });
  

  
  // Check if we have any filtered data
  if (filteredRows.length === 0) {
    document.getElementById('mainTableBox').innerHTML = '<div class="alert alert-info">No data available for the selected filters.</div>';
    return;
  }

  // Columns to display (remove 'Country', 'Portfolio', 'DC Capacity (Mwp)')
  const displayHeaders = [
    'Month',
    'IC Approved Budget (MWh)',
    'Expected Budget (MWh)',
    'Actual Generation (MWh)',
    'Grid Curtailment Budget (MWh)',
    'Actual Curtailment (MWh)',
    'Budget Irradiation (kWh/M2)',
    'Actual Irradiation (kWh/M2)',
    'Expected PR (%)',
    'Actual PR (%)'
  ];

  // Group by month
  let monthMap = {};
  filteredRows.forEach(row => {
    const m = row['Month'];
    if (!monthMap[m]) monthMap[m] = [];
    monthMap[m].push(row);
  });

  // Dynamically determine months to show, sorted in calendar order
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  // Get unique months from filtered data
  let monthsInData = Object.keys(monthMap);
  
  // Sort months using the month_sort field for proper chronological order
  monthsInData.sort((a, b) => {
    // Find the first row for each month to get the month_sort value
    const aRow = filteredRows.find(row => row['Month'] === a);
    const bRow = filteredRows.find(row => row['Month'] === b);
    
    const aSort = aRow && aRow['month_sort'] ? aRow['month_sort'] : a;
    const bSort = bRow && bRow['month_sort'] ? bRow['month_sort'] : b;
    

    
    // Compare using ISO date strings for proper chronological sorting
    return aSort.localeCompare(bSort);
  });
  

  // Determine the cutoff month (N-1)
  const today = new Date();
  const cutoffDate = new Date(today.getFullYear(), today.getMonth() - 1, 1); // Previous month, 1st day
  const cutoffISOString = cutoffDate.toISOString().split('T')[0]; // YYYY-MM-DD format
  

  
  // Helper to check if a month is <= cutoff using month_sort field
  function isUpToCutoff(monthStr) {
    // Find the row with this month to get the month_sort value
    const row = filteredRows.find(r => r['Month'] === monthStr);
    if (row && row['month_sort']) {
      const result = row['month_sort'] <= cutoffISOString;
      return result;
    }
    
    // Fallback: parse month string directly if month_sort is not available
    // Handle format like "Jul 2025" or "July 2025"
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const fullMonthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    
    // Extract month and year from monthStr
    const parts = monthStr.split(' ');
    if (parts.length >= 2) {
      const monthPart = parts[0];
      const yearPart = parts[1];
      
      // Find month index
      let monthIndex = monthNames.indexOf(monthPart);
      if (monthIndex === -1) {
        monthIndex = fullMonthNames.indexOf(monthPart);
      }
      
      if (monthIndex !== -1 && yearPart) {
        const year = parseInt(yearPart);
        const month = monthIndex + 1;
        
        // Create date string for comparison (YYYY-MM-DD format)
        const monthDateStr = `${year}-${month.toString().padStart(2, '0')}-01`;
        const result = monthDateStr <= cutoffISOString;
        return result;
      }
    }
    
    // If we can't parse, assume it's not up to cutoff
    return false;
  }

  // Show all months in the table
  const monthsToShow = monthsInData;

  // Prepare aggregated rows
  let aggregatedRows = [];
  let totalSums = {};
  let totalCounts = {};
  displayHeaders.forEach(h => { totalSums[h] = 0; totalCounts[h] = 0; });

  monthsToShow.forEach(m => {
    const rows = monthMap[m];
    let agg = { 'Month': m };
    // Sum numeric columns
    [
      'IC Approved Budget (MWh)',
      'Expected Budget (MWh)',
      'Actual Generation (MWh)',
      'Grid Curtailment Budget (MWh)',
      'Actual Curtailment (MWh)',
      'Budget Irradiation (kWh/M2)',
      'Actual Irradiation (kWh/M2)'
    ].forEach(h => {
      agg[h] = rows.reduce((sum, r) => {
        const value = r[h];
        const numValue = Number(String(value || '0').replace(/,/g,''));
        return sum + (isNaN(numValue) ? 0 : numValue);
      }, 0);
      // Only sum for totals if up to cutoff
      if (isUpToCutoff(m)) totalSums[h] += agg[h];
    });
    // Average for PR%: get all valid PR values for each column separately
    ['Expected PR (%)','Actual PR (%)'].forEach(h => {
      let vals = rows.map(r => {
        const value = r[h];

        
        // Handle different possible formats: number, string with %, etc.
        let numValue;
        if (typeof value === 'number') {
          numValue = value;
        } else if (typeof value === 'string') {
          // Handle empty strings, null, undefined
          if (!value || value.trim() === '' || value.trim() === 'null' || value.trim() === 'undefined') {

            return null;
          }
          numValue = parseFloat(value.replace('%','').trim());
        } else {
          // Handle null, undefined, or other falsy values
          if (!value || value === null || value === undefined) {

            return null;
          }
          numValue = parseFloat(String(value).replace('%','').trim());
        }
        
        
        return !isNaN(numValue) && numValue > 0 ? numValue : null;
      }).filter(v => v !== null);
      
      
      agg[h] = vals.length ? (vals.reduce((a,b) => a+b,0)/vals.length) : 0;
      

      
      // Only count for totals if up to cutoff
      if (isUpToCutoff(m)) {
        totalSums[h] += agg[h];
        totalCounts[h] += vals.length;
      }
    });
    aggregatedRows.push(agg);
  });

  // Build table HTML
  let tableHtml = `<table class="table custom-table table-bordered table-hover" style="table-layout: fixed !important; width: 100% !important;"><thead><tr>`;
  displayHeaders.forEach(h => tableHtml += `<th>${h}</th>`);
  tableHtml += `</tr></thead><tbody>`;
  aggregatedRows.forEach(row => {
    tableHtml += "<tr>";
    displayHeaders.forEach(h => {
      let cell = row[h];
      if (h === 'Month') {
        tableHtml += `<td>${cell}</td>`;
      } else if (h.includes('PR (%)')) {
        cell = (isNaN(cell) || cell === 0) ? '' : cell.toFixed(2) + '%';
        tableHtml += `<td>${cell}</td>`;
      } else {
        cell = isNaN(cell) ? '' : Number(Math.round(cell)).toLocaleString('en-IN');
        tableHtml += `<td>${cell}</td>`;
      }
    });
    tableHtml += "</tr>";
  });
  // Calculate totals for full year (2025)
  let fullYearSums = {};
  let fullYearCounts = {};
  displayHeaders.forEach(h => { fullYearSums[h] = 0; fullYearCounts[h] = 0; });

  aggregatedRows.forEach(row => {
    const m = row['Month'];
    // Sum numeric columns for full year
    [
      'IC Approved Budget (MWh)',
      'Expected Budget (MWh)',
      'Actual Generation (MWh)',
      'Grid Curtailment Budget (MWh)',
      'Actual Curtailment (MWh)',
      'Budget Irradiation (kWh/M2)',
      'Actual Irradiation (kWh/M2)'
    ].forEach(h => {
      fullYearSums[h] += row[h] || 0;
    });
    
    // Count for PR averages for full year
    ['Expected PR (%)','Actual PR (%)'].forEach(h => {
      let value = row[h];
      if (value && !isNaN(value) && value > 0) {
        fullYearSums[h] += value;
        fullYearCounts[h] += 1;
      }
    });
  });

  // Add full year totals row
  tableHtml += `<tr style="font-weight:bold;background:#e6f1fc;"><td>Total (2025)</td>`;
  displayHeaders.slice(1).forEach(h => {
    if (h.includes('PR (%)')) {
      // Average over all months where this specific PR column has valid values
      let validMonths = aggregatedRows.filter(row => {
        let value = row[h];
        return value && !isNaN(value) && value > 0;
      });
      let avg = 0;
      if (validMonths.length > 0) {
        avg = validMonths.reduce((sum, row) => sum + (row[h] || 0), 0) / validMonths.length;
      }
      tableHtml += `<td>${avg === 0 ? '' : avg.toFixed(2) + '%'}</td>`;
    } else {
      let val = fullYearSums[h];
      tableHtml += `<td>${isNaN(val) ? '' : Number(Math.round(val)).toLocaleString('en-IN')}</td>`;
    }
  });
  tableHtml += `</tr>`;

  // Add "Till Month-25" totals row (up to cutoff month)
  const currentDate = new Date();
  const currentMonth = currentDate.getMonth(); // 0-based
  const currentYear = currentDate.getFullYear();
  const tillMonthName = monthNames[currentMonth - 1]; // Previous month
  const tillMonthLabel = `Total (Till ${tillMonthName}-${currentYear.toString().slice(-2)})`;
  
  tableHtml += `<tr style="font-weight:bold;background:#e6f1fc;"><td>${tillMonthLabel}</td>`;
  displayHeaders.slice(1).forEach(h => {
    if (h.includes('PR (%)')) {
      // Average over months up to cutoff where this specific PR column has valid values
      let validMonths = aggregatedRows.filter(row => {
        let value = row[h];
        return value && !isNaN(value) && value > 0 && isUpToCutoff(row['Month']);
      });
      let avg = 0;
      if (validMonths.length > 0) {
        avg = validMonths.reduce((sum, row) => sum + (row[h] || 0), 0) / validMonths.length;
      }
      tableHtml += `<td>${avg === 0 ? '' : avg.toFixed(2) + '%'}</td>`;
    } else {
      let val = totalSums[h];
      tableHtml += `<td>${isNaN(val) ? '' : Number(Math.round(val)).toLocaleString('en-IN')}</td>`;
    }
  });
  tableHtml += `</tr>`;

  tableHtml += "</tbody></table>";
  document.getElementById('mainTableBox').innerHTML = tableHtml;
}

// Add summary table rendering using the data from Django view
function renderSummaryTable() {
  // Use the data that's already loaded from Django view
  if (allDataRows.length === 0) {
    return;
  }
  
  // Create summary by portfolio
  const portfolioSummary = {};
  allDataRows.forEach(row => {
    const portfolio = row['Portfolio'];
    if (!portfolioSummary[portfolio]) {
      portfolioSummary[portfolio] = {
        'IC Approved Budget (MWh)': 0,
        'Expected Budget (MWh)': 0,
        'Actual Generation (MWh)': 0,
        'count': 0
      };
    }
    portfolioSummary[portfolio]['IC Approved Budget (MWh)'] += Number(row['IC Approved Budget (MWh)'] || 0);
    portfolioSummary[portfolio]['Expected Budget (MWh)'] += Number(row['Expected Budget (MWh)'] || 0);
    portfolioSummary[portfolio]['Actual Generation (MWh)'] += Number(row['Actual Generation (MWh)'] || 0);
    portfolioSummary[portfolio]['count'] += 1;
  });
  
  // Define reasons for each portfolio
  const portfolioReasons = {
    'Korea-Blackwood': 'Backup data for IC approved budget is not available to find actual reasons for the difference.',
    'Korea-Iceberg': 'Backup data for IC approved budget is not available to find actual reasons for the difference.',
    'Singapore': 'NIL',
    'SG Matco Asia': 'NIL',
    'TW-Yunlin': 'NIL',
    'JP Minamata': 'Updated : Degradation Loss, IAM factor,Albedo.',
    'Korea-Sroof': 'Updated : Tilt Angle as per as built diagram.'
  };
  
  // Build summary table
  let tableHtml = `<table class="table summary-table table-bordered table-hover" style="table-layout: fixed !important; width: 100% !important;"><thead><tr>`;
  tableHtml += `<th>Portfolio</th>`;
  tableHtml += `<th>IC Approved Budget (MWh)</th>`;
  tableHtml += `<th>Expected Budget (MWh)</th>`;
  tableHtml += `<th>Difference (%)</th>`;
  tableHtml += `<th>Reasons</th>`;
  tableHtml += `</tr></thead><tbody>`;
  
  Object.keys(portfolioSummary).forEach(portfolio => {
    const data = portfolioSummary[portfolio];
    const difference = data['Expected Budget (MWh)'] > 0 ? 
      ((data['IC Approved Budget (MWh)'] - data['Expected Budget (MWh)']) / data['Expected Budget (MWh)'] * 100).toFixed(2) : '';
    
    // Get reason for this portfolio, or default message
    const reason = portfolioReasons[portfolio] || 'Backup data for IC approved budget is not available to find actual reasons for the difference.';
    
    tableHtml += '<tr>';
    tableHtml += `<td>${portfolio}</td>`;
    tableHtml += `<td>${Math.round(Number(data['IC Approved Budget (MWh)'])).toLocaleString('en-IN')}</td>`;
    tableHtml += `<td>${Math.round(Number(data['Expected Budget (MWh)'])).toLocaleString('en-IN')}</td>`;
    tableHtml += `<td>${difference}%</td>`;
    tableHtml += `<td>${reason}</td>`;
    tableHtml += '</tr>';
  });
  
  tableHtml += '</tbody></table>';
  document.getElementById('summaryTableBox').innerHTML = tableHtml;
}

// Tab switching functionality
document.addEventListener('DOMContentLoaded', function() {
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabPanes = document.querySelectorAll('.tab-pane');
  
  tabBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      const targetTab = this.getAttribute('data-tab');
      
      // Remove active class from all buttons and panes
      tabBtns.forEach(b => b.classList.remove('active'));
      tabPanes.forEach(p => p.classList.remove('active'));
      
      // Add active class to clicked button and corresponding pane
      this.classList.add('active');
      document.getElementById(targetTab).classList.add('active');
    });
  });
});
