<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Activity Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .download-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            color: white;
        }
    </style>
</head>
<body>
    <div class="download-card">
        <h3 class="text-center mb-4">
            <i class="fas fa-download"></i>
            Download User Activity Data
        </h3>
        
        <form id="downloadForm" class="row g-3">
            <div class="col-md-6">
                <label for="start_date" class="form-label">Start Date</label>
                <input type="date" class="form-control" id="start_date" name="start_date">
            </div>
            <div class="col-md-6">
                <label for="end_date" class="form-label">End Date</label>
                <input type="date" class="form-control" id="end_date" name="end_date">
            </div>
            <div class="col-md-6">
                <label for="user_filter" class="form-label">User</label>
                <input type="text" class="form-control" id="user_filter" name="user" placeholder="Username">
            </div>
            <div class="col-md-6">
                <label for="action_filter" class="form-label">Action</label>
                <select class="form-select" id="action_filter" name="action">
                    <option value="">All Actions</option>
                    <option value="login">Login</option>
                    <option value="logout">Logout</option>
                    <option value="view">View</option>
                    <option value="create">Create</option>
                    <option value="update">Update</option>
                    <option value="delete">Delete</option>
                    <option value="download">Download</option>
                    <option value="upload">Upload</option>
                </select>
            </div>
            <div class="col-md-8">
                <label for="ip_filter" class="form-label">IP Address</label>
                <input type="text" class="form-control" id="ip_filter" name="ip" placeholder="IP Address">
            </div>
            <div class="col-md-4">
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="include_suspicious" name="include_suspicious" value="true">
                    <label class="form-check-label" for="include_suspicious">
                        Suspicious Activities Only
                    </label>
                </div>
            </div>
            <div class="col-12 text-center mt-4">
                <button type="button" class="btn download-btn" onclick="startDownload()">
                    <i class="fas fa-download me-2"></i>
                    Download CSV File
                </button>
            </div>
        </form>
        
        <div id="downloadStatus" class="mt-3" style="display: none;">
            <div class="alert alert-info text-center">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Preparing your download...
            </div>
        </div>
        
        <div class="text-center mt-3">
            <small class="text-muted">
                This window will close automatically after download starts
            </small>
        </div>
    </div>

    <script>
        // Get URL parameters if passed from parent window
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Pre-fill form with URL parameters
            if (urlParams.get('start_date')) document.getElementById('start_date').value = urlParams.get('start_date');
            if (urlParams.get('end_date')) document.getElementById('end_date').value = urlParams.get('end_date');
            if (urlParams.get('user')) document.getElementById('user_filter').value = urlParams.get('user');
            if (urlParams.get('action')) document.getElementById('action_filter').value = urlParams.get('action');
            if (urlParams.get('ip')) document.getElementById('ip_filter').value = urlParams.get('ip');
            if (urlParams.get('include_suspicious') === 'true') document.getElementById('include_suspicious').checked = true;
        });

        function startDownload() {
            // Show loading status
            document.getElementById('downloadStatus').style.display = 'block';
            
            // Get form values
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            const userFilter = document.getElementById('user_filter').value;
            const actionFilter = document.getElementById('action_filter').value;
            const ipFilter = document.getElementById('ip_filter').value;
            const includeSuspicious = document.getElementById('include_suspicious').checked;
            
            // Build query parameters
            const params = new URLSearchParams();
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (userFilter) params.append('user', userFilter);
            if (actionFilter) params.append('action', actionFilter);
            if (ipFilter) params.append('ip', ipFilter);
            if (includeSuspicious) params.append('include_suspicious', 'true');
            
            // Create download URL
            const downloadUrl = '{% url "main:download_user_activity" %}?' + params.toString();
            
            // Start download by navigating to the URL
            window.location.href = downloadUrl;
            
            // Close window after short delay
            setTimeout(() => {
                window.close();
            }, 2000);
        }
    </script>
</body>
</html>
