<body>
  <div class="dashboard-main-wrapper">

  <script>
    AOS.init({ duration: 900, once: true });
    // -----------------------------
    // Revenue Loss Dashboard Script
    // -----------------------------
    //
    let prData = [];
    let revenueInstance = null;
    let currentYear = null;
    let currentMonth = null;
    let bestCalendar = null;
    let isYearMode = false; // Track if we're in year selection mode

    function getAvailableMonths() {
      // Get current date for comparison
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth() + 1; // JavaScript months are 0-based
      
      // Returns sorted array of unique YYYY-MM strings in prData that have actual data
      const months = Array.from(new Set(
        prData
          .filter(r => {
            // Only include rows that have actual data (non-null revenue_loss values)
            const revenueLoss = parseFloat(r.revenue_loss);
            if (isNaN(revenueLoss) || !r.month) return false;
            
            // Parse the month from data
            const monthStr = (r.month || '').slice(0,7);
            if (!monthStr || monthStr.length !== 7) return false;
            
            const [year, month] = monthStr.split('-');
            const dataYear = parseInt(year);
            const dataMonth = parseInt(month);
            
            // Only include months that are not in the future
            if (dataYear > currentYear) return false;
            if (dataYear === currentYear && dataMonth > currentMonth) return false;
            
            return true;
          })
          .map(r => (r.month || '').slice(0,7))
          .filter(Boolean)
      ));
      
      months.sort((a, b) => {
        // Sort months chronologically
        const [aYear, aMonth] = a.split('-');
        const [bYear, bMonth] = b.split('-');
        if (aYear !== bYear) return parseInt(aYear) - parseInt(bYear);
        return parseInt(aMonth) - parseInt(bMonth);
      });
      
      return months;
    }

    function setLatestMonth() {
      const months = getAvailableMonths();
      if (months.length) {
        const [y, m] = months[months.length-1].split('-');
        currentYear = +y;
        currentMonth = +m;
      } else {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth() + 1;
      }
    }

    // Function to set current month based on available data
    function setCurrentMonth() {
      // Get available months from the data
      const availableMonths = getAvailableMonths();
      
      
      if (availableMonths.length > 0) {
        // Use the latest available month from the data
        const latestMonth = availableMonths[availableMonths.length - 1];
        const [year, month] = latestMonth.split('-');
        currentYear = parseInt(year);
        currentMonth = parseInt(month);
        
        // Update the label to show the latest available month
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const monthName = monthNames[parseInt(month) - 1];
        document.getElementById('selectedMonthLabel').textContent = `${monthName} ${year}`;
        
      } else {
        // No data available, reset selections
        currentYear = null;
        currentMonth = null;
        document.getElementById('selectedMonthLabel').textContent = 'Select Period';
      }
      
      // Update the label and trigger chart update
      updateCountryOptions();
      updatePortfolioOptions();
      updateRevenueChart();
    }

    function updateMonthLabel() {
      const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      document.getElementById('selectedMonthLabel').textContent = `${monthNames[currentMonth-1]} ${currentYear}`;
    }

    function changeMonth(delta) {
      currentMonth += delta;
      if (currentMonth < 1) {
        currentMonth = 12;
        currentYear -= 1;
      } else if (currentMonth > 12) {
        currentMonth = 1;
        currentYear += 1;
      }
      // Clamp to available months
      const months = getAvailableMonths();
      const target = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
      if (!months.includes(target)) {
        // If not available, try next in direction
        if (delta > 0) {
          for (let i = 0; i < months.length; i++) {
            if (months[i] > target) {
              const [y, m] = months[i].split('-');
              currentYear = +y; currentMonth = +m; break;
            }
          }
        } else {
          for (let i = months.length-1; i >= 0; i--) {
            if (months[i] < target) {
              const [y, m] = months[i].split('-');
              currentYear = +y; currentMonth = +m; break;
            }
          }
        }
      }
      updateMonthLabel();
      updateCountryOptions();
      updatePortfolioOptions();
      updateRevenueChart();
    }

      const m = rowMonth.toString().slice(0,7);
      return m === `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
    }

    function isInSelectedYear(rowMonth) {
      if (!rowMonth) return false;
      const year = rowMonth.toString().slice(0,4);
      return year === String(currentYear);
    }

    // Responsive font size helper for chart
    function getBigFont(base = 32, max = 66, min = 16) {
      const width = window.innerWidth;
      return Math.max(min, Math.min(max, Math.round(base * (width / 1920))));
    }

    // Responsive bar width helper
    function getBarWidth() {
      const width = window.innerWidth;
      if (width <= 1200) return 10;
      if (width <= 1400) return 15;
      if (width <= 1600) return 18;
      return 20;
    }

    // Responsive Y-axis name gap helper
    function getYAxisNameGap() {
      const width = window.innerWidth;
      if (width <= 1200) return 40;
      if (width <= 1400) return 45;
      if (width <= 1600) return 50;
      return 55;
    }

    // Format a value as K (thousands) or M (millions) for display
    // Use appropriate format based on value size to match Y-axis
    function formatK(v) {
      v = +v;
      if (isNaN(v)) return '';
      // If value is >= 1 million, use M format with no decimals
      if (Math.abs(v) >= 1000000) {
        const millions = v / 1000000;
        return Math.round(millions) + 'M';
      }
      // If value is >= 1 thousand, use K format with no decimals
      if (Math.abs(v) >= 1000) {
        const thousands = v / 1000;
        return Math.round(thousands) + 'K';
      }
      // For very small values, still show in K format
      if (Math.abs(v) > 0) {
        const thousands = v / 1000;
        return Math.round(thousands) + 'K';
      }
      return '0K';
    }
    
    // Format for Y-axis labels - use M for millions
    function formatYAxis(v) {
      v = +v;
      if (isNaN(v)) return '';
      if (Math.abs(v) >= 1000000) {
        const millions = v / 1000000;
        // Show 1 decimal place for Y-axis
        return millions.toFixed(1) + 'M';
      }
      if (Math.abs(v) >= 1000) {
        const thousands = v / 1000;
        return thousands.toFixed(1) + 'K';
      }
      return v.toString();
    }

    // Get array of YYYY-MM strings for selected month range
    function getMonthRangeArr() {
      const sy = +document.getElementById('startYear').value;
      const sm = +document.getElementById('startMonth').value;
      const ey = +document.getElementById('endYear').value;
      const em = +document.getElementById('endMonth').value;
      const arr = [];
      let y=sy, m=sm;
      while(y<ey|| (y===ey&&m<=em)) {
        arr.push(`${y}-${String(m).padStart(2,'0')}`);
        m++;
        if(m>12){ m=1; y++; }
      }
      return arr;
    }

    // Check if a record's month is within the selected range
    function isInMonthRange(raw) {
      if (!raw) return false;
      const m = raw.toString().slice(0,7);
      return getMonthRangeArr().includes(m);
    }

    // Custom tooltip functionality (similar to PR Gap dashboard)
    function showCustomTooltip(content, event) {
      // Remove existing custom tooltip if any
      const existingTooltip = document.getElementById('custom-tooltip');
      if (existingTooltip) {
        existingTooltip.remove();
      }
      
      // Create tooltip element
      const tooltip = document.createElement('div');
      tooltip.id = 'custom-tooltip';
      
      // Add close button to the content
      const contentWithCloseButton = `
        <div style="position: relative;">
          <button id="tooltip-close-btn" style="
            position: absolute;
            top: 8px;
            right: 8px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: background 0.2s;
          " onmouseover="this.style.background='#cc0000'" onmouseout="this.style.background='#e60000'">×</button>
          ${content}
        </div>
      `;
      
      tooltip.innerHTML = contentWithCloseButton;
      tooltip.style.cssText = `
        position: fixed;
        z-index: 10000;
        background: white;
        border: 2px solid #0072CE;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        padding: 0;
        max-width: 1000px;
        max-height: 600px;
        overflow-y: auto;
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 14px;
        line-height: 1.4;
        color: #333;
      `;
      
      // Add to document first to get dimensions
      document.body.appendChild(tooltip);
      
      // Get tooltip dimensions
      const tooltipRect = tooltip.getBoundingClientRect();
      const tooltipWidth = tooltipRect.width;
      const tooltipHeight = tooltipRect.height;
      
      // Get viewport dimensions
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      
      // Get actual header height by measuring the header elements
      const headerElement = document.querySelector('.dashboard-header');
      const filterElement = document.querySelector('.filter-section');
      const headerHeight = (headerElement ? headerElement.offsetHeight : 60) + 
                          (filterElement ? filterElement.offsetHeight : 50) + 20; // Add 20px buffer
      
      // Calculate optimal position
      let x, y;
      
      // Horizontal positioning - prefer right side of screen for better visibility
      const rightSpace = viewportWidth - event.clientX;
      const leftSpace = event.clientX;
      
      if (rightSpace >= tooltipWidth + 20) {
        // Position to the right of cursor
        x = event.clientX + 20;
      } else if (leftSpace >= tooltipWidth + 20) {
        // Position to the left of cursor
        x = event.clientX - tooltipWidth - 20;
      } else {
        // Center horizontally if not enough space on either side
        x = Math.max(10, (viewportWidth - tooltipWidth) / 2);
      }
      
      // Vertical positioning - ALWAYS start below header and stay within viewport
      const minY = headerHeight + 10; // Always start below header with 10px buffer
      const maxY = viewportHeight - tooltipHeight - 10; // Leave 10px from bottom
      
      // Calculate available space below header
      const availableSpaceBelowHeader = viewportHeight - headerHeight - 20;
      
      if (availableSpaceBelowHeader >= tooltipHeight) {
        // Enough space below header - position in center of available space
        y = Math.max(minY, Math.min(maxY, headerHeight + 50));
      } else {
        // Not enough space - position at minimum Y (just below header)
        y = minY;
      }
      
      // Ensure tooltip doesn't go off-screen horizontally
      x = Math.max(10, Math.min(x, viewportWidth - tooltipWidth - 10));
      
      // Final boundary check - ensure tooltip is always within viewport
      if (y + tooltipHeight > viewportHeight - 10) {
        y = viewportHeight - tooltipHeight - 10;
      }
      if (y < minY) {
        y = minY;
      }
      
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
      
      // Function to close tooltip
      const closeTooltip = () => {
        tooltip.remove();
        document.removeEventListener('click', handleOutsideClick);
        window.removeEventListener('resize', repositionTooltip);
      };
      
      // Add click outside to close
      const handleOutsideClick = (e) => {
        if (!tooltip.contains(e.target)) {
          closeTooltip();
        }
      };
      
      // Function to reposition tooltip on window resize
      const repositionTooltip = () => {
        if (tooltip && tooltip.parentNode) {
          // Recalculate header height
          const headerElement = document.querySelector('.dashboard-header');
          const filterElement = document.querySelector('.filter-section');
          const newHeaderHeight = (headerElement ? headerElement.offsetHeight : 60) + 
                                 (filterElement ? filterElement.offsetHeight : 50) + 20;
          
          // Recalculate viewport dimensions
          const newViewportWidth = window.innerWidth;
          const newViewportHeight = window.innerHeight;
          
          // Get current tooltip dimensions
          const tooltipRect = tooltip.getBoundingClientRect();
          const tooltipWidth = tooltipRect.width;
          const tooltipHeight = tooltipRect.height;
          
          // Recalculate position
          let newX = parseFloat(tooltip.style.left);
          let newY = parseFloat(tooltip.style.top);
          
          // Ensure tooltip stays within new viewport bounds
          newX = Math.max(10, Math.min(newX, newViewportWidth - tooltipWidth - 10));
          newY = Math.max(newHeaderHeight + 10, Math.min(newY, newViewportHeight - tooltipHeight - 10));
          
          tooltip.style.left = newX + 'px';
          tooltip.style.top = newY + 'px';
        }
      };
      
      // Add event listener for close button
      setTimeout(() => {
        const closeBtn = document.getElementById('tooltip-close-btn');
        if (closeBtn) {
          closeBtn.addEventListener('click', closeTooltip);
        }
        
        // Add click outside to close
        document.addEventListener('click', handleOutsideClick);
        window.addEventListener('resize', repositionTooltip);
      }, 100);
    }

    // Format currency with thousand separators
    function formatCurrency(value) {
      const num = parseFloat(value);
      if (isNaN(num)) return '0';
      return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    
    // Format number with thousand separators but no decimals (for tooltips)
    function formatNumberWithSeparator(value) {
      const num = parseFloat(value);
      if (isNaN(num)) return '0';
      return Math.round(num).toLocaleString('en-US');
    }

    // Main function to update the revenue loss chart
    function updateRevenueChart(){
      // Filter data by month/year, country, and portfolio
      let f = prData.filter(r => isYearMode ? isInSelectedYear(r.month) : isInSelectedMonth(r.month));
      
      // Get selected values from multi-select components
      const selectedCountries = countryMultiSelect ? countryMultiSelect.selectedValues : [];
      const selectedPortfolios = portfolioMultiSelect ? portfolioMultiSelect.selectedValues : [];
      const selectedBudgetType = budgetTypeSelect ? budgetTypeSelect.value : 'expected';
      
      // Filter by countries (if any selected)
      if (selectedCountries.length > 0) {
        f = f.filter(r => selectedCountries.includes(r.country));
      }
      
      // Filter by portfolios (if any selected)
      if (selectedPortfolios.length > 0) {
        f = f.filter(r => selectedPortfolios.includes(r.portfolio));
      }

      // Aggregate average revenue loss per asset
      const map = {};
      f.forEach(r=>{
        const a = r.asset_no||r.assetno||r.asset||'Unknown';
        // Use appropriate revenue loss column based on budget type
        const revenueField = selectedBudgetType === 'operational' ? 'revenue_loss_op' : 'revenue_loss';
        const v = parseFloat(r[revenueField]);
        if(!isNaN(v)){
          map[a] = map[a]||{tot:0,c:0,details:[]};
          map[a].tot += v;
          map[a].c   += 1;
          map[a].details.push({month: r.month, value: v});
        }
      });
      
      // Prepare data for chart
      const pts = Object.entries(map).map(([a,v])=>{
        // Calculate average for month mode and total for year mode
        const avg = v.tot/v.c;
        const total = v.tot;
        
        // For year mode: sum of all monthly values (total annual revenue loss/gain)
        // For month mode: average monthly revenue loss
        const value = isYearMode ? total : avg;
        
        return { asset:a, loss:value, color: value>=0 ? '#1aaa55' : '#e73323' };
      }).sort((a,b)=>b.loss-a.loss);

      const x = pts.map(p=>p.asset), y=pts.map(p=>p.loss), cols=pts.map(p=>p.color);

        // Check if click is in X-axis area (bottom of chart)
        if (pointInGrid && pointInGrid[0] !== undefined && pointInGrid[0] >= 0 && pointInGrid[0] < x.length) {
          const assetIndex = Math.floor(pointInGrid[0]);
          const assetNo = x[assetIndex];
          const periodStr = isYearMode ? `${currentYear} (Year)` : `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
          
          const tooltipContent = createRevenueLossTooltip(assetNo, periodStr);
          showCustomTooltip(tooltipContent, params.event);
        }
      });

      // Render the chart
      try {
        revenueInstance.setOption(option);
        
        // Force a resize to ensure the chart is visible
        setTimeout(() => {
          revenueInstance.resize();
        }, 100);
      } catch (error) {
        // Error rendering chart
      }
      
      // Responsive: resize chart and update on window resize
      window.addEventListener('resize', ()=> {
        if (revenueInstance) {
          revenueInstance.resize();
        }
        
        // Hide tooltip on window resize to prevent positioning issues
        const existingTooltip = document.getElementById('custom-tooltip');
        if (existingTooltip) {
          existingTooltip.remove();
        }
      });
      
      // Ensure chart fills available space
      setTimeout(() => {
        if (revenueInstance) {
          revenueInstance.resize();
        }
      }, 100);
    }

    // Multi-select components handle their own change events through callbacks
    // No need for separate event listeners as they're handled in initializeMultiSelects()

    // Initialize BestCalendar component
    function initializeBestCalendar() {
      if (typeof BestCalendar === 'undefined') {
        return false;
      }
      
      bestCalendar = new BestCalendar({
        triggerId: 'monthMatrixTrigger',
        pickerId: 'monthMatrixPicker',
        labelId: 'selectedMonthLabel',
        data: [],
        options: {
          range: false, // Single month selection mode
          autoCloseDelay: 1000, // Auto close after 1 second
          onPeriodChange: function(period) {
            if (period.month) {
              const [y, m] = period.month.split('-');
              currentYear = +y;
              currentMonth = +m;
              isYearMode = false;
              updateMonthLabel();
              updateCountryOptions();
              updatePortfolioOptions();
              updateRevenueChart();
              
              // Hide the picker after selection
              if (typeof bestCalendar.hidePicker === 'function') {
                setTimeout(() => {
                  bestCalendar.hidePicker();
                }, 500);
              }
              
              // Force hide picker by manipulating DOM directly
              setTimeout(() => {
                const picker = document.getElementById('monthMatrixPicker');
                if (picker) {
                  picker.style.display = 'none';
                  picker.classList.remove('show');
                  picker.classList.add('bc-hidden');
                }
              }, 600);
            } else if (period.year) {
              currentYear = +period.year;
              isYearMode = true;
              // For year selection, we'll show all months in that year
              const availableMonths = getAvailableMonths();
              const yearMonths = availableMonths.filter(m => m.startsWith(period.year + '-'));
              if (yearMonths.length > 0) {
                const [y, m] = yearMonths[0].split('-');
                currentMonth = +m;
              } else {
                currentMonth = 1; // Default to January
              }
              // Update label to show year
              document.getElementById('selectedMonthLabel').textContent = `${currentYear} (Year)`;
              updateCountryOptions();
              updatePortfolioOptions();
              updateRevenueChart();
              
              // Hide the picker after selection
              if (typeof bestCalendar.hidePicker === 'function') {
                setTimeout(() => {
                  bestCalendar.hidePicker();
                }, 500);
              }
              
              // Force hide picker by manipulating DOM directly
              setTimeout(() => {
                const picker = document.getElementById('monthMatrixPicker');
                if (picker) {
                  picker.style.display = 'none';
                  picker.classList.remove('show');
                  picker.classList.add('bc-hidden');
                }
              }, 600);
            }
          }
        }
      });
      
      // Set global instance for onclick handlers
      window.currentBestCalendar = bestCalendar;
      
      // Add custom click handler for calendar trigger
      const calendarTrigger = document.getElementById('monthMatrixTrigger');
      if (calendarTrigger) {
        calendarTrigger.addEventListener('click', function(e) {
          e.stopPropagation();
          const picker = document.getElementById('monthMatrixPicker');
          if (picker) {
            // Force show the picker
            picker.style.display = 'flex';
            picker.style.visibility = 'visible';
            picker.style.opacity = '1';
            picker.style.zIndex = '999999';
            picker.style.position = 'fixed';
            picker.classList.remove('bc-hidden');
            picker.classList.add('show');
            
            // Position the picker relative to the trigger
            const rect = calendarTrigger.getBoundingClientRect();
            picker.style.top = (rect.bottom + 5) + 'px';
            picker.style.left = rect.left + 'px';
            picker.style.width = '300px';
            picker.style.height = 'auto';
            picker.style.maxHeight = '400px';
            picker.style.overflow = 'auto';
          }
        });
      }
      
      // Add click outside handler to close picker
      document.addEventListener('click', function(event) {
        const picker = document.getElementById('monthMatrixPicker');
        const trigger = document.getElementById('monthMatrixTrigger');
        
        if (picker && trigger && !picker.contains(event.target) && !trigger.contains(event.target)) {
          if (typeof bestCalendar.hidePicker === 'function') {
            bestCalendar.hidePicker();
          }
          // Force hide picker by manipulating DOM directly
          picker.style.display = 'none';
          picker.classList.remove('show');
          picker.classList.add('bc-hidden');
        }
      });
      
      return true;
    }

    // Load data from Django view
    document.addEventListener('DOMContentLoaded', function() {
      {% if error_message %}
        document.getElementById('loadingSpinner').innerHTML = "<div class='text-danger'>Error loading revenue loss data: {{ error_message }}</div>";
      {% elif yield_data_json %}
        const data = {{ yield_data_json|safe }};
        prData = data; // Assign to prData for chart updates
        
        // Check if BestCalendar is available
        if (typeof BestCalendar !== 'undefined') {
          try {
            const calendarInitResult = initializeBestCalendar();
            
            if (calendarInitResult && bestCalendar) {
              // Format data for BestCalendar
              const availableMonths = getAvailableMonths();
              
              let convertedMonths = [];
              if (availableMonths.length > 0) {
                convertedMonths = availableMonths.map(month => ({ month, value: 1 }));
              }
              
              if (typeof bestCalendar.setData === 'function') {
                bestCalendar.setData(convertedMonths);
              }
              
              // Set to latest available month and update chart
              setCurrentMonth();
              
              // Initialize multi-select components after data is loaded
              try {
                initializeMultiSelects();
                updateCountryOptions();
                updatePortfolioOptions();
              } catch (error) {
                // Error initializing multi-select components
              }
              
              // Set the latest available month in the calendar
              if (availableMonths.length > 0) {
                const latestMonth = availableMonths[availableMonths.length - 1];
                if (typeof bestCalendar.setSelectedMonth === 'function') {
                  bestCalendar.setSelectedMonth(latestMonth);
                }
              }
              
              // Force BestCalendar to render its content
              const picker = document.getElementById('monthMatrixPicker');
              if (picker) { 
                picker.innerHTML = ''; 
              }
              
              if (typeof bestCalendar.renderPicker === 'function') {
                bestCalendar.renderPicker();
              }
              
            } else {
              // Fallback: set current month and update chart
              setCurrentMonth();
              // Initialize multi-select components
              try {
                initializeMultiSelects();
                updateCountryOptions();
                updatePortfolioOptions();
              } catch (error) {
                // Error initializing multi-select components
              }
            }
          } catch (error) {
            // Fallback: set current month and update chart
            setCurrentMonth();
            // Initialize multi-select components
            try {
              if (typeof MultiSelect !== 'undefined') {
                initializeMultiSelects();
              }
            } catch (error) {
              // Error initializing multi-select components
            }
          }
        } else {
          // Fallback: set current month and update chart
          setCurrentMonth();
          // Initialize multi-select components
          try {
            if (typeof MultiSelect !== 'undefined') {
              initializeMultiSelects();
            }
          } catch (error) {
            // Error initializing multi-select components
          }
        }
      {% else %}
        document.getElementById('loadingSpinner').innerHTML = "<div class='text-danger'>No revenue loss data available. Please check your permissions.</div>";
      {% endif %}
    });
  </script>
</body>
